<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8F9FA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      border: 1px solid #F3F4F6;
      max-width: 400px;
      width: 90%;
    }
    .icon {
      width: 80px; height: 80px;
      background: #6366F1;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
    }
    h1 { font-size: 28px; font-weight: 800; color: #111827; margin-bottom: 8px; }
    p { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: #EEF2FF;
      color: #6366F1;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .links { display: flex; flex-direction: column; gap: 10px; }
    a {
      display: block;
      padding: 12px 20px;
      background: #F8F9FA;
      border-radius: 12px;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #F3F4F6;
      transition: background 0.2s;
    }
    a:hover { background: #EEF2FF; color: #6366F1; }
    footer { margin-top: 20px; font-size: 11px; color: #D1D5DB; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon.png" style="width:80px;height:80px;border-radius:20px;" />
    <h1>StudyAI</h1>
    <div class="badge">Powered by GPT-4o mini</div>
    <p>Ton assistant d'étude intelligent — Quiz, Flashcards, Résumés, Plans d'étude et plus encore.</p>
    <div class="links">
      <a href="#" style="background:#6366F1;color:white;border:none;">📲 Télécharger sur Google Play</a>
      <a href="/privacy.html">🔒 Politique de confidentialité</a>
      <a href="/terms.html">📄 Conditions d'utilisation</a>
      <a href="mailto:mindforge.studio.dev@gmail.com">✉️ Nous contacter</a>
    </div>
    <footer>© 2025 StudyAI — MindForge Studio</footer>
  </div>
</body>
</html>
